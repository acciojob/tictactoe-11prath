<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #fefefe;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
    }
    #setup {
      margin-bottom: 20px;
    }
    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }
    #submit {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .message {
      font-size: 20px;
      margin-bottom: 20px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      justify-content: center;
    }
    .cell {
      width: 100px;
      height: 100px;
      background-color: pink;
      font-size: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .cell.winner {
      background-color: purple;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="setup">
      <input type="text" id="player-1" placeholder="Enter Player 1 Name" />
      <input type="text" id="player-2" placeholder="Enter Player 2 Name" />
      <button id="submit">Start Game</button>
    </div>

    <div id="game" style="display: none;">
      <h1>Tic Tac Toe</h1>
      <div class="message"></div>
      <div class="board">
        <div class="cell" id="1"></div>
        <div class="cell" id="2"></div>
        <div class="cell" id="3"></div>
        <div class="cell" id="4"></div>
        <div class="cell" id="5"></div>
        <div class="cell" id="6"></div>
        <div class="cell" id="7"></div>
        <div class="cell" id="8"></div>
        <div class="cell" id="9"></div>
      </div>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById("submit");
    const player1Input = document.getElementById("player-1");
    const player2Input = document.getElementById("player-2");
    const setupDiv = document.getElementById("setup");
    const gameDiv = document.getElementById("game");
    const messageDiv = document.querySelector(".message");
    const cells = document.querySelectorAll(".cell");

    let player1 = "";
    let player2 = "";
    let currentPlayer = "";
    let currentSymbol = "";
    let board = Array(9).fill("");

    const winningCombos = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    submitBtn.addEventListener("click", () => {
      player1 = player1Input.value.trim();
      player2 = player2Input.value.trim();
      if (!player1 || !player2) return alert("Please enter both names.");
      currentPlayer = player1;
      currentSymbol = "X";
      setupDiv.style.display = "none";
      gameDiv.style.display = "block";
      messageDiv.textContent = `${currentPlayer}, you're up`;
    });

    cells.forEach((cell, index) => {
      cell.addEventListener("click", () => {
        if (board[index] || checkWinner()) return;
        board[index] = currentSymbol;
        cell.textContent = currentSymbol;

        const winner = checkWinner();
        if (winner) {
          messageDiv.textContent = `${currentPlayer}, congratulations you won!`;
          winner.forEach(i => cells[i].classList.add("winner"));
        } else {
          switchTurn();
        }
      });
    });

    function switchTurn() {
      if (currentPlayer === player1) {
        currentPlayer = player2;
        currentSymbol = "O";
      } else {
        currentPlayer = player1;
        currentSymbol = "X";
      }
      messageDiv.textContent = `${currentPlayer}, you're up`;
    }

    function checkWinner() {
      for (let combo of winningCombos) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return combo;
        }
      }
      return null;
    }
  </script>
</body>
</html>
