<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      text-align: center;
      background: #fff0f5;
    }
    .container {
      margin-top: 40px;
    }
    h1 {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: black;
      letter-spacing: 2px;
    }
    input {
      margin: 5px;
      padding: 10px;
      font-size: 1rem;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 1rem;
      cursor: pointer;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      background: pink;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
    }
    .cell.taken {
      pointer-events: none;
    }
    .cell.win {
      background: purple;
      color: white;
    }
    .message {
      margin-top: 10px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Initial Input View -->
    <h1>TIC TAC TOE</h1>
    <input type="text" id="player-1" placeholder="enter name" />
    <input type="text" id="player-2" placeholder="enter name" />
    <button id="submit">Start Game</button>

    <!-- Message -->
    <div class="message"></div>

    <!-- Board -->
    <div class="board" id="board" style="display:none;">
      <div class="cell" id="1"></div>
      <div class="cell" id="2"></div>
      <div class="cell" id="3"></div>
      <div class="cell" id="4"></div>
      <div class="cell" id="5"></div>
      <div class="cell" id="6"></div>
      <div class="cell" id="7"></div>
      <div class="cell" id="8"></div>
      <div class="cell" id="9"></div>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById("submit");
    const board = document.getElementById("board");
    const messageDiv = document.querySelector(".message");
    const cells = document.querySelectorAll(".cell");

    let player1 = "";
    let player2 = "";
    let currentPlayer = "";
    let currentSymbol = "X";

    const winningCombos = [
      [1,2,3],[4,5,6],[7,8,9], // rows
      [1,4,7],[2,5,8],[3,6,9], // cols
      [1,5,9],[3,5,7]          // diagonals
    ];

    submitBtn.addEventListener("click", () => {
      player1 = document.getElementById("player-1").value.trim();
      player2 = document.getElementById("player-2").value.trim();

      if(player1 === "" || player2 === "") {
        alert("Please enter both player names!");
        return;
      }

      currentPlayer = player1;
      currentSymbol = "X";
      messageDiv.textContent = `${currentPlayer}, you're up`;
      board.style.display = "grid";
    });

    cells.forEach(cell => {
      cell.addEventListener("click", () => {
        if(cell.textContent !== "") return;

        cell.textContent = currentSymbol;
        cell.classList.add("taken");

        const winCombo = checkWin(currentSymbol);
        if(winCombo) {
          messageDiv.textContent = `${currentPlayer}, congratulations you won!`;
          highlightWin(winCombo);
          endGame();
          return;
        }

        // Switch player
        if(currentPlayer === player1) {
          currentPlayer = player2;
          currentSymbol = "O";
        } else {
          currentPlayer = player1;
          currentSymbol = "X";
        }

        messageDiv.textContent = `${currentPlayer}, you're up`;
      });
    });

    function checkWin(symbol) {
      for (let combo of winningCombos) {
        if (combo.every(id => document.getElementById(id).textContent === symbol)) {
          return combo; // return winning combo
        }
      }
      return null;
    }

    function highlightWin(combo) {
      combo.forEach(id => {
        document.getElementById(id).classList.add("win");
      });
    }

    function endGame() {
      cells.forEach(cell => cell.classList.add("taken"));
    }
  </script>
</body>
</html>
